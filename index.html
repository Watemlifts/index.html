<script>
    // ===== DEMO DATA =====
    const demoData = {
        basic: {
            name: 'Basic',
            features: ['Daily trading signals', 'Basic portfolio tracking', 'Email alerts', 'Web3 balance checks'],
            stats: { balance: '$10,000', profit: '+3.2%', change: 'positive' },
            signals: [
                { pair: 'BTC/USD', price: '$67,420', change: '+2.3%' },
                { pair: 'ETH/USD', price: '$3,520', change: '+1.8%' }
            ]
        },
        premium: {
            name: 'Premium',
            features: ['Real-time trading signals', 'Advanced portfolio tracking', 'Telegram/Discord alerts', 'Priority support', 'Custom trading strategies'],
            stats: { balance: '$50,000', profit: '+8.7%', change: 'positive' },
            signals: [
                { pair: 'BTC/USD', price: '$67,420', change: '+2.3%' },
                { pair: 'ETH/USD', price: '$3,520', change: '+1.8%' },
                { pair: 'LTC/USD', price: '$82.50', change: '+0.9%' }
            ]
        },
        enterprise: {
            name: 'Enterprise',
            features: ['Everything in Premium', 'White-label solution', 'Dedicated API access', '24/7 phone support', 'Team accounts (up to 5)', 'Custom integrations'],
            stats: { balance: '$200,000', profit: '+15.4%', change: 'positive' },
            signals: [
                { pair: 'BTC/USD', price: '$67,420', change: '+2.3%' },
                { pair: 'ETH/USD', price: '$3,520', change: '+1.8%' },
                { pair: 'LTC/USD', price: '$82.50', change: '+0.9%' },
                { pair: 'XRP/USD', price: '$0.51', change: '+1.2%' }
            ]
        }
    };

    // ---- Demo Modal functions ----
    function openDemo(planKey) {
        const data = demoData[planKey];
        if (!data) return;
        document.getElementById('planName').innerText = data.name;
        let featHtml = '<ul style="list-style:none; padding:0;">';
        data.features.forEach(f => { featHtml += `<li style="padding:4px 0;">✅ ${f}</li>`; });
        featHtml += '</ul>';
        document.getElementById('modalFeatures').innerHTML = featHtml;
        const profitClass = data.stats.change === 'positive' ? 'green' : 'red';
        document.getElementById('demoStats').innerHTML = `
            <div class="stat"><span class="label">Balance</span><br/><span class="value">${data.stats.balance}</span></div>
            <div class="stat"><span class="label">Total Profit</span><br/><span class="value ${profitClass}">${data.stats.profit}</span></div>
        `;
        let sigHtml = '';
        data.signals.forEach(s => {
            const changeClass = s.change.startsWith('+') ? 'green' : 'red';
            sigHtml += `<li><span>${s.pair}</span><span>${s.price} <span class="signal-change ${changeClass}">${s.change}</span></span></li>`;
        });
        document.getElementById('demoSignals').innerHTML = sigHtml;
        document.getElementById('demoModal').classList.add('active');
    }

    function closeDemo() {
        document.getElementById('demoModal').classList.remove('active');
    }

    // Close modal on overlay click
    document.getElementById('demoModal').addEventListener('click', function(e) {
        if (e.target === this) closeDemo();
    });

    // ============================================================
    //  MAIN PAYMENT HANDLER – WITH LOGIN CHECK AND CREDENTIALS
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        const payBtn = document.getElementById('payNowBtn');
        if (!payBtn) return;

        payBtn.addEventListener('click', async function() {
            console.log('✅ Button clicked – starting payment flow...');

            // Gather data
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const plan = document.getElementById('planSelect').value;
            const currency = document.getElementById('currency').value;
            const notes = document.getElementById('notes').value.trim();

            if (!firstName || !lastName || !email || !phone || !plan || !currency) {
                alert('Please fill in all required fields.');
                return;
            }

            // 1) Check if user is already logged in (send credentials)
            let isLoggedIn = false;
            try {
                const meRes = await fetch('/api/auth/me', {
                    credentials: 'include'  // <-- send cookie
                });
                if (meRes.ok) {
                    isLoggedIn = true;
                    console.log('✅ User is already logged in.');
                }
            } catch (e) {}

            // 2) If not logged in, attempt signup AND login
            if (!isLoggedIn) {
                const randomPassword = Math.random().toString(36).slice(-8) + 'A1!';

                try {
                    console.log('📝 Signing up user...');
                    const signupRes = await fetch('/api/auth/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: email,
                            password: randomPassword,
                            full_name: firstName + ' ' + lastName,
                            phone: phone
                        })
                    });

                    if (!signupRes.ok) {
                        const err = await signupRes.json();
                        if (err.error && err.error.includes('already exists')) {
                            alert('An account with this email already exists. Please log in first.\n\n' +
                                  'Click OK to go to the login page.');
                            window.location.href = '/dashboard';
                            return;
                        } else {
                            alert('Signup failed: ' + (err.error || 'Unknown error'));
                            console.error('Signup error:', err);
                            return;
                        }
                    }

                    console.log('✅ Signup successful. Logging in...');

                    // --- LOGIN after signup ---
                    const loginRes = await fetch('/api/auth/login', {
                        method: 'POST',
                        credentials: 'include',      // <-- save the cookie
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: randomPassword })
                    });

                    if (!loginRes.ok) {
                        const err = await loginRes.json();
                        alert('Login failed after signup: ' + (err.error || 'Unknown error'));
                        return;
                    }

                    console.log('✅ Login successful.');
                    isLoggedIn = true;

                } catch (error) {
                    console.error('❌ Signup/login error:', error);
                    alert('An unexpected error occurred. Please try again.');
                    return;
                }
            }

            // 3) Now initiate payment (user is logged in, cookie will be sent)
            try {
                console.log('💳 Initiating payment for plan:', plan);
                const paymentRes = await fetch('/api/payment/initiate', {
                    method: 'POST',
                    credentials: 'include',         // <-- send the cookie
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plan: plan, currency: currency })
                });

                if (!paymentRes.ok) {
                    const err = await paymentRes.json();
                    alert('Payment initiation failed: ' + (err.error || 'Unknown error'));
                    console.error('Payment error:', err);
                    return;
                }

                const paymentData = await paymentRes.json();
                console.log('✅ Payment initiated:', paymentData);

                if (paymentData.redirect_url) {
                    window.location.href = paymentData.redirect_url;
                } else {
                    alert('Payment initiated, but no redirect URL received. Please contact support.');
                }

            } catch (error) {
                console.error('❌ Payment error:', error);
                alert('An unexpected error occurred during payment initiation.');
            }
        });
    });
</script>
